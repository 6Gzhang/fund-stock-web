<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金股票分析软件</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-bar">
        <div class="logo">基金股票分析</div>
        <div class="version-info">
            <span class="version-text" id="versionText">v1.0.0</span>
            <button class="version-check-btn" id="versionCheckBtn" title="检查更新">⟳</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索股票/基金代码或名称...">
            <select id="searchCategory">
                <option value="all">全部</option>
                <option value="stock">股票</option>
                <option value="fund">基金</option>
                <option value="etf">ETF</option>
            </select>
            <button id="searchBtn">搜索</button>
            <!-- 搜索结果下拉 -->
            <div class="search-results" id="searchResults" style="display:none;"></div>
        </div>
        <div class="market-indices" id="marketIndices">
            <span class="index-loading">加载指数中...</span>
        </div>
    </header>

    <!-- 标签页导航 -->
    <nav class="tabs">
        <button class="tab active" data-tab="market">行情</button>
        <button class="tab" data-tab="positions">持仓</button>
        <button class="tab" data-tab="trades">交易记录</button>
        <button class="tab" data-tab="watchlist">自选</button>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 行情页 -->
        <div class="tab-content active" id="tab-market">
            <div class="market-layout">
                <!-- 左侧：行情信息 + 交易面板 -->
                <div class="left-panel">
                    <div class="card quote-card" id="quoteCard">
                        <div class="card-placeholder">请搜索并选择一只股票或基金查看详情</div>
                    </div>
                    <div class="card trade-card" id="tradeCard" style="display:none;">
                        <h3>模拟交易</h3>
                        <div class="trade-form">
                            <div class="trade-type">
                                <button class="trade-type-btn active" data-action="buy">买入</button>
                                <button class="trade-type-btn" data-action="sell">卖出</button>
                            </div>
                            <div class="form-row">
                                <label>价格</label>
                                <input type="number" id="tradePrice" step="0.01" placeholder="当前价格">
                            </div>
                            <div class="form-row">
                                <label>数量（股/份）</label>
                                <input type="number" id="tradeShares" step="1" placeholder="交易数量">
                            </div>
                            <div class="form-row">
                                <label>金额</label>
                                <input type="text" id="tradeAmount" readonly placeholder="自动计算">
                            </div>
                            <button id="tradeSubmit" class="btn btn-primary">确认交易</button>
                        </div>
                    </div>
                </div>

                <!-- 中间：图表 -->
                <div class="center-panel">
                    <div class="card chart-card">
                        <div class="chart-period">
                            <button class="period-btn active" data-period="30">30天</button>
                            <button class="period-btn" data-period="90">90天</button>
                            <button class="period-btn" data-period="180">180天</button>
                            <button class="period-btn" data-period="365">1年</button>
                        </div>
                        <div id="mainChart" class="chart-container"></div>
                    </div>
                </div>

                <!-- 右侧：AI 分析 -->
                <div class="right-panel">
                    <div class="card ai-card" id="aiCard">
                        <h3>AI 智能分析</h3>
                        <div class="card-placeholder">选择标的后点击分析</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 持仓页 -->
        <div class="tab-content" id="tab-positions">
            <div class="card">
                <h3>我的持仓</h3>
                <div class="positions-summary" id="positionsSummary"></div>
                <table class="data-table" id="positionsTable">
                    <thead>
                        <tr>
                            <th>代码</th><th>名称</th><th>类型</th><th>持仓数量</th>
                            <th>成本价</th><th>现价</th><th>市值</th><th>盈亏</th><th>盈亏%</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 交易记录页 -->
        <div class="tab-content" id="tab-trades">
            <div class="card">
                <h3>交易记录</h3>
                <table class="data-table" id="tradesTable">
                    <thead>
                        <tr>
                            <th>时间</th><th>代码</th><th>名称</th><th>类型</th>
                            <th>操作</th><th>数量</th><th>价格</th><th>金额</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 自选页 -->
        <div class="tab-content" id="tab-watchlist">
            <div class="card">
                <h3>我的自选</h3>
                <table class="data-table" id="watchlistTable">
                    <thead>
                        <tr>
                            <th>代码</th><th>名称</th><th>类型</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
