<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金股票分析软件</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-bar">
        <div class="logo">
            <span class="logo-icon"></span>
            <span class="logo-text">基金股票分析</span>
        </div>
        <div class="search-box">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="搜索股票/基金代码或名称...">
                <select id="searchCategory">
                    <option value="all">全部</option>
                    <option value="stock">股票</option>
                    <option value="fund">基金</option>
                    <option value="etf">ETF</option>
                </select>
                <button id="searchBtn" class="search-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <div class="search-results" id="searchResults" style="display:none;"></div>
        </div>
        <div class="market-indices" id="marketIndices">
            <span class="index-loading">加载指数中...</span>
        </div>
        <div class="version-info" id="versionInfo">
            <span class="version-text" id="versionText">v1.5.0</span>
            <span class="update-badge" id="updateBadge" title="有新版本"></span>
            <button class="version-check-btn" id="versionCheckBtn" title="检查更新">⟳</button>
        </div>
    </header>

    <!-- 标签页导航 -->
    <nav class="tabs">
        <button class="tab active" data-tab="recommend">
            <span class="tab-dot"></span> 智能推荐
        </button>
        <button class="tab" data-tab="market">
            <span class="tab-dot"></span> 行情分析
        </button>
        <button class="tab" data-tab="positions">
            <span class="tab-dot"></span> 持仓
        </button>
        <button class="tab" data-tab="watchlist">
            <span class="tab-dot"></span> 自选
        </button>
        <button class="tab" data-tab="trades">
            <span class="tab-dot"></span> 交易记录
        </button>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 智能推荐页 -->
        <div class="tab-content active" id="tab-recommend">
            <div class="recommend-header">
                <div class="recommend-title-wrap">
                    <h2>智能推荐</h2>
                    <span class="recommend-subtitle">基于多维度技术面分析，每日实时更新</span>
                </div>
                <div class="recommend-tabs">
                    <button class="recommend-tab active" data-type="all">全部</button>
                    <button class="recommend-tab" data-type="stock">股票</button>
                    <button class="recommend-tab" data-type="fund">基金/ETF</button>
                </div>
                <div class="recommend-header-right">
                    <span class="recommend-update-time" id="recommendUpdateTime">--</span>
                    <button id="refreshRecommendBtn" class="btn btn-secondary">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                            <path d="M21 3v5h-5"></path>
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                            <path d="M8 16H3v5"></path>
                        </svg>
                        刷新推荐
                    </button>
                </div>
            </div>
            <div class="recommend-content">
                <div class="recommend-loading" id="recommendLoading">
                    <div class="loading-spinner"></div>
                    <p>正在分析市场数据，生成推荐...</p>
                    <p class="loading-tip">首次加载可能需要 1-2 分钟</p>
                </div>
                <div class="recommend-list" id="recommendList" style="display:none;"></div>
            </div>
        </div>

        <!-- 行情页 -->
        <div class="tab-content" id="tab-market">
            <div class="market-layout">
                <div class="left-panel">
                    <div class="card quote-card" id="quoteCard">
                        <div class="card-placeholder">
                            <div class="placeholder-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                            </div>
                            <p>请搜索并选择一只股票或基金查看详情</p>
                        </div>
                    </div>
                    <div class="card trade-card" id="tradeCard" style="display:none;">
                        <h3>模拟交易</h3>
                        <div class="trade-form">
                            <div class="trade-type">
                                <button class="trade-type-btn buy active" data-action="buy">买入</button>
                                <button class="trade-type-btn sell" data-action="sell">卖出</button>
                            </div>
                            <div class="form-row">
                                <label>价格</label>
                                <input type="number" id="tradePrice" step="0.01" placeholder="当前价格">
                            </div>
                            <div class="form-row">
                                <label>数量（股/份）</label>
                                <input type="number" id="tradeShares" step="1" placeholder="交易数量">
                            </div>
                            <div class="form-row">
                                <label>金额</label>
                                <input type="text" id="tradeAmount" readonly placeholder="自动计算">
                            </div>
                            <button id="tradeSubmit" class="btn btn-primary">确认交易</button>
                        </div>
                    </div>
                </div>

                <div class="center-panel">
                    <div class="card chart-card">
                        <div class="chart-period">
                            <button class="period-btn active" data-period="30">30天</button>
                            <button class="period-btn" data-period="90">90天</button>
                            <button class="period-btn" data-period="180">180天</button>
                            <button class="period-btn" data-period="365">1年</button>
                        </div>
                        <div id="mainChart" class="chart-container"></div>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="card ai-card" id="aiCard">
                        <div class="ai-header">
                            <h3>AI 智能分析</h3>
                            <span class="ai-badge">多维度</span>
                        </div>
                        <div class="card-placeholder">
                            <div class="placeholder-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 2a10 10 0 1 0 10 10"></path>
                                    <path d="M12 6v6l4 2"></path>
                                </svg>
                            </div>
                            <p>选择标的后自动分析</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 持仓页 -->
        <div class="tab-content" id="tab-positions">
            <div class="card">
                <div class="card-header">
                    <h3>我的持仓</h3>
                </div>
                <div class="positions-summary" id="positionsSummary"></div>
                <div class="table-wrapper">
                    <table class="data-table" id="positionsTable">
                        <thead>
                            <tr>
                                <th>代码</th><th>名称</th><th>类型</th><th>持仓数量</th>
                                <th>成本价</th><th>现价</th><th>市值</th><th>盈亏</th><th>盈亏%</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 自选页 -->
        <div class="tab-content" id="tab-watchlist">
            <div class="card">
                <div class="card-header">
                    <h3>我的自选</h3>
                </div>
                <div class="table-wrapper">
                    <table class="data-table" id="watchlistTable">
                        <thead>
                            <tr>
                                <th>代码</th><th>名称</th><th>类型</th><th>现价</th><th>涨跌幅</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 交易记录页 -->
        <div class="tab-content" id="tab-trades">
            <div class="card">
                <div class="card-header">
                    <h3>交易记录</h3>
                </div>
                <div class="table-wrapper">
                    <table class="data-table" id="tradesTable">
                        <thead>
                            <tr>
                                <th>时间</th><th>代码</th><th>名称</th><th>类型</th>
                                <th>操作</th><th>数量</th><th>价格</th><th>金额</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
